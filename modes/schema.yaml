# Forge Protocol Mode Definition Schema
# Reference only — not validated at runtime. See lib/modes.py for the parser.
# Use this as a guide when creating custom modes.

type: object
required:
  - id
  - name
  - description
  - system_prompt_file
  - behaviors

properties:
  id:
    type: string
    description: Unique mode identifier (lowercase, no spaces)
    pattern: "^[a-z][a-z0-9_-]*$"

  name:
    type: string
    description: Human-readable mode name

  description:
    type: string
    description: One-line description of the mode's purpose

  system_prompt_file:
    type: string
    description: Relative path to the SOUL/system prompt markdown file

  behaviors:
    type: object
    required:
      - required
      - forbidden
    properties:
      required:
        type: array
        items:
          type: string
        description: >
          Natural language rules the LLM MUST follow in this mode.
          The orchestrator LLM evaluates compliance — no regex.
      forbidden:
        type: array
        items:
          type: string
        description: >
          Natural language rules the LLM MUST NOT violate in this mode.
          The orchestrator LLM evaluates compliance — no regex.

  input_rules:
    type: array
    items:
      type: string
    description: >
      Natural language rules for what the user must provide before the LLM engages.
      The orchestrator LLM evaluates whether the user's input meets these rules.
      Example: "User must submit their own draft" or "User must present at least 3 ideas".

  metacognitive:
    type: object
    properties:
      checkpoint_interval:
        type: integer
        default: 0
        description: Inject a metacognitive prompt every N messages (0 = disabled)
      prompts:
        type: array
        items:
          type: string
        description: Pool of metacognitive prompts to rotate through
      session_end_prompt:
        type: string
        description: Prompt shown when the user ends a session in this mode

  transitions:
    type: object
    properties:
      allowed_from:
        type: array
        items:
          type: string
        description: Modes that can transition INTO this mode
      allowed_to:
        type: array
        items:
          type: string
        description: Modes this mode can transition TO
      confirm_switch:
        type: boolean
        default: false
        description: Require user confirmation before switching away
