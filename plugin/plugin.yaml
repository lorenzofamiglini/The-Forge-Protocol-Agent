name: forge-protocol
version: 0.2.0
description: "Cognitive anti-deskilling framework — 4 interaction modes (Forge, Anvil, Crucible, Executor) that protect human thinking skills when working with AI."
author: Forge Protocol Contributors
provides_tools:
  - forge_validate_input
  - forge_validate_output
  - forge_checkpoint
  - forge_get_state
  - forge_set_mode
  - forge_canary_list
  - forge_canary_submit
  - forge_dependency_report
  - forge_log
provides_hooks:
  - on_session_start
  - on_session_end
